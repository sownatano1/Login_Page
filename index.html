<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <section class="login-container">
        <h1>Login</h1>
        <form action="login"></form>
            <label for="email"></label>
            <input id="email" type="email" placeholder="E-mail" required>

            <label for="password"></label>
            <input id="psw" type="password" placeholder="Password" required>
            
            <div class="incorrect-container" id="incorrect-container"></div>

            <a href="#" class="forgot-psw">Forgot Password?</a>

            <button id="submit" type="submit" onclick="Submit()">Login</button>

            <p>Don't have an account? <a href="#">Register</a></p>
    </section>

    <footer>
        <p>Made by C. Jonathan D.</p>
        <a class="github" href="https://github.com/sownatano1">My Github</a>
    </footer>
</body>
</html>
